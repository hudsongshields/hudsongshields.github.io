<!DOCTYPE html>

<html lang="en">

    <head>

        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">

        <!-- http://getbootstrap.com/docs/5.3/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

        <!-- https://favicon.io/emoji-favicons/money-bag/ -->
        <link href="/static/favicon.ico" rel="icon">

        <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
        <link href="{{ url_for('static', filename='contact.css') }}" rel="stylesheet">


        <title>Portfolio</title>

    </head>

    <body>
        <div class="container">
            <header>
                <div class="introduction">
                    <h1 class="name">Hudson Shields - <em>Computer Programmer</em></h1>

                </div>
                <div class="button-container">

                    <button id="homeButton" class="headerButtons">Home</button>
                    <button id="projectButton" class="headerButtons">More Projects</button>
                    <button id="resumeButton" class="headerButtons">Resume</button>
                </div>
            </header>
        </div>
        <div class="contactInfo">
            <form action="https://api.web3forms.com/submit" method="POST" class="contact-left">
                <div class="contact-left-title">
                    <h3>Get In Touch</h3>
                    <hr>
                </div>
                <input type="hidden" name="access_key" value="9645bf7e-0e84-417f-826c-8244256b1f4c">
                <input type="text" id="name" name="name" placeholder="Your Name" class="contact-inputs" required>
                <input type="email" id="email" name="email" placeholder="Email" class="contact-inputs" required>
                <textarea id="message" name="message" rows="4" class="contact-inputs" placeholder="How can I help you?" required></textarea>
                <button type="submit">Send<img src="assets/arrow_icon.png" alt=""></button>
            </form>
            <div class="contact-right">
                <img src="/assets/right_img.png" alt="">
            </div>
            </div>

    </body>
    <script>

        resume = document.querySelector('#resumeButton')
        resume.addEventListener("click", function() {
            window.location.href = "/resume";
        });

        home = document.querySelector('#homeButton')
        home.addEventListener("click", function() {
            window.location.href = "/";
        });

        //implement the more projects button when additional projects are created

    </script>
</html>
